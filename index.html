<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Timer</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            font-family: sans-serif;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 { color: #000; margin: 0; }
        footer { color: #000; font-size: 0.9rem; }

        #egg {
            width: 220px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0d8c3);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1), 10px 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            transition: background 0.5s;
        }

        #timer { font-size: 2.5rem; font-weight: bold; color: #555; }

        select {
            padding: 5px;
            border-radius: 10px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .controls { display: flex; gap: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 20px; background: #f6cd0b; color: white; }
        .finished { background: #f1c40f !important; }
    </style>
</head>
<body>

    <h1>Egg Timer</h1>

    <div id="egg">
        <select id="eggType" onchange="setEggTime()">
            <option value="360">Soft-boiled (6m)</option>
            <option value="480">Medium-boiled (8m)</option>
            <option value="600">Hard-boiled (10m)</option>
        </select>
        <div id="timer">06:00</div>
        <div class="controls">
            <button onclick="startTimer()">Start</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <footer>Tapfone © 2026</footer>

    <script>
        let timeLeft = 360; 
        let timerId = null;
        const timerDisplay = document.getElementById('timer');
        const eggTypeSelect = document.getElementById('eggType');
        const egg = document.getElementById('egg');

        function playAlert() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime); // High pitch A5
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.5); // Plays for 0.5 seconds
        }

        function setEggTime() {
            timeLeft = parseInt(eggTypeSelect.value);
            updateDisplay();
        }

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerId) return;
            egg.classList.remove('finished');
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    egg.classList.add('finished');
                    playAlert();
                    alert("Your egg is ready!");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            setEggTime();
            egg.classList.remove('finished');
        }
    </script>
</body>
</html>
